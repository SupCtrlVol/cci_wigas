<CtrlVol4.html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Centro de Control de Información</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background-color: #BBB9BA;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background-color: #fff;
      color: #CA142B;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      border-bottom: 8px solid #CA142B;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    header img {
      height: 45px;
      margin-right: 15px;
    }
    header h1 {
      margin: 0;
      font-weight: 400;
      font-size: 1.6em;
    }
    header p {
      margin: 0;
      font-size: 1em;
      color: #555;
    }
    .main {
      display: flex;
      flex: 1;
    }
    .sidebar {
      width: 240px;
      background: #fff;
      padding: 20px;
      border-right: 2px solid #CA142B;
      box-shadow: 2px 0 6px rgba(0,0,0,0.1);
    }
    .contenedor {
      flex: 1;
      background: #fff;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-start;
      position: relative;
    }
    .gas-widget, .mxn-widget {
      margin-bottom: 20px;
    }
    iframe {
      width: 317px;
      height: 200px;
      border: none;
      border-radius: 8px;
    }
    footer {
      background-color: #CA142B;
      color: #fff;
      text-align: center;
      padding: 12px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <img src="log.png" alt="log.png">
    <div>
      <h1>Centro de Control de Información</h1>
      <p>Información estratégica para la operación y control</p>
    </div>
  </header>

  <div class="main">
    <div class="sidebar">
      <!-- Aquí mantienes tus botones de reportes -->
    </div>

    <div class="contenedor" id="contenedor">
      <!-- Widget Gas Natural -->
      <div class="gas-widget">
        <iframe src="https://ssltsw.investing.com?pairs=8862&theme=darkTheme"
                frameborder="0" allowtransparency="true" marginwidth="0" marginheight="0">
        </iframe>
      </div>
            <!-- Widget MXN/USD -->
      <div class="mxn-widget">
        <iframe src="https://ssltsw.investing.com?pairs=39&theme=darkTheme"
                frameborder="0" allowtransparency="true" marginwidth="0" marginheight="0">
        </iframe>
      </div>
    </div>
  </div>

  <footer>
    Área de Controles Volumétricos
  </footer>
</body>
</html>
